    <style>
        :root { --primary: #fe3c72; --bg: #fdf2f5; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: #1c1e21; }
        
        header { 
            background: var(--white); padding: 10px 15px; display: flex;

        .menu-dropdown { 
            display: none; position: absolute; top: 30px; right: 0; background: #fff;

        #smartSearch { width: 100%; padding: 12px 35px; border-radius: 30px; border: 1px solid #ddd; outline: none; font-size: 14px; box-sizing: border-box; background: #fdf9fa; }

        .card { background: var(--white); border-radius: 15px; overflow: hidden; border: 1px solid #e0e0e0; display: flex; flex-direction: column; position: relative; }

        .social-links { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
        .social-item { background: #fff0f3; padding: 3px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; color: #d63384; border: 1px dashed #ffb3c1; }
        .btn-connect { background: var(--primary); color: white; text-align: center; padding: 10px; text-decoration: none; font-weight: bold; border-radius: 10px; font-size: 12px; border:none; cursor: pointer; }

            width: 100%; max-width: 165px; margin: 5px auto; border-radius: 15px; 
            overflow: hidden; background: #000; position: relative; padding-top: 293px; 
            border: 3px solid #fff; box-shadow: 0 0 0 4px #fdf2f5; z-index: 5;
        }
        .video-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #social-preview-list { background:#fff9fa; padding: 12px; border-radius: 12px; margin: 10px 0; text-align:left; font-size:11px; font-weight:bold; color:var(--primary); border: 1px dashed #ffccd5; }
        .open-btn { background: #42b72a; color: white; padding: 16px; display: block; border-radius: 35px; text-decoration: none; font-weight: 800; margin: 15px 0; border:none; width:100%; font-size:16px; cursor:pointer; }

</head>
<body>

<div class="top-bar">Trial ends in <span id="timer">05:00</span></div>

<header>
    <div class="header-left">
        <img src="logo.jpg" class="site-logo" onerror="this.src='logo.png'">
        <h1>LuvNova<span>PRO</span></h1>
    </div>
    <div class="menu-btn"><i class="fas fa-bars"></i></div>
</header>

<div class="search-container">
    <input type="text" id="smartSearch" placeholder="Search profiles..." onkeyup="filterProfiles()">
</div>

<div id="main-grid" class="grid"></div>

<div id="locker">
    <div class="locker-box">
        <h2 style="color:var(--primary); font-size:19px; margin: 0;">Verification Required 🔒</h2>
        <p style="font-size:11px; color: #777; margin-top: 5px;">Unlock <b><span id="target-name"></span></b>'s private data.</p>
        <div id="social-preview-list"></div>
        <button onclick="_Hj()" class="open-btn">OPEN ACCESS NOW</button>
        <div class="video-container">
            <video id="tutorialVideo" controls playsinline>
                <source src="tutorial.mp4" type="video/mp4">
            </video>
        </div>
    </div>
</div>

<script>
    const firstNames = ["Maddie", "Sienna", "Chloe", "Amber", "Tiffany", "Elena", "Sophie", "Isabella", "Lexi", "Brook", "Jade", "Nikki", "Emma", "Mila", "Aria", "Scarlett"];
    const cityOptions = ["London", "New York", "Toronto", "Miami", "Los Angeles"];
    const bioTemplates = ["Looking for a real man to build a life with. 💍", "Single mom here. Tired of being lonely. 🏠", "Wealthy but alone.. ✨", "Ready to move for the right man. ✈️"];

    function getRandomSocials() { return ["WhatsApp", "Instagram", "Snapchat", "TikTok"].sort(() => 0.5 - Math.random()).slice(0, 3); }

    // دالة إنشاء الكروت المعدلة لتبحث في المجلد الرئيسي مباشرة
    function createCard(num, type, minAge, maxAge) {
        let name = firstNames[Math.floor(Math.random() * firstNames.length)] + " " + String.fromCharCode(65 + Math.floor(Math.random() * 26)) + ".";
        let age = Math.floor(Math.random() * (maxAge - minAge + 1)) + minAge;
        let city = cityOptions[Math.floor(Math.random() * cityOptions.length)];
        let bio = bioTemplates[Math.floor(Math.random() * bioTemplates.length)];
        let socials = getRandomSocials();
        
        // تعديل المسار ليكون بجانب index.html مباشرة
        let fileName = `${type.toLowerCase()}_${num}.jpg`;
        let socialHtml = socials.map(s => `<div class="social-item">🔒 ${s}</div>`).join('');

        return `<div class="card" data-search="${name.toLowerCase()} ${city.toLowerCase()}">
                <img src="${fileName}" onerror="this.parentElement.style.display='none'">
                <div class="info">
                    <div class="name-age">${name}, ${age}</div>
                    <div class="loc">${city}</div>
                    <span class="girl-msg">"${bio}"</span>
                    <div class="social-links">${socialHtml}</div>
                    <button class="btn-connect" onclick="openLocker('${name}', '${socials.join(', ')}')">Connect Now</button>
                </div>
            </div>`;
    }

    const grid = document.getElementById('main-grid');
    let allContent = [];
    // إنشاء 30 كارت من كل نوع (مجموع 90 كارت)
    for (let i = 1; i <= 30; i++) {
        allContent.push(createCard(i, 'young', 24, 33));
        allContent.push(createCard(i, 'moms', 35, 45));
        allContent.push(createCard(i, 'granny', 50, 65));
    }
    allContent.sort(() => Math.random() - 0.5);
    grid.innerHTML = allContent.join('');

    function filterProfiles() {
        let input = document.getElementById('smartSearch').value.toLowerCase();
        let cards = document.getElementsByClassName('card');
        for (let i = 0; i < cards.length; i++) {
            let searchContent = cards[i].getAttribute('data-search');
            cards[i].style.display = searchContent.includes(input) ? "" : "none";
        }
    }

    let time = 300;
    setInterval(() => {
        let min = Math.floor(time / 60); let sec = time % 60;
        document.getElementById('timer').innerText = `0${min}:${sec < 10 ? '0'+sec : sec}`;
        if(time > 0) time--;
    }, 1000);

    function openLocker(name, socials) {
        document.getElementById('target-name').innerText = name;
        let list = socials.split(', ');
        let previewHtml = list.map(s => `<div>✅ ${s}: LOCKED</div>`).join('');
        document.getElementById('social-preview-list').innerHTML = previewHtml;
        document.getElementById('locker').style.display = 'flex';
        document.getElementById('tutorialVideo').play();
    }
</script>
</body>
</html>
