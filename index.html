<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuvNova Pro</title>
    <style>
        /* تنسيق الصفحة */
        body { 
            background-color: #0b0b0b; 
            color: #ffffff; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
        }

        .header { padding: 30px 10px; }
        
        /* تنسيق اللوجو */
        .logo { 
            width: 180px; 
            max-width: 50%; 
            margin-bottom: 15px; 
            filter: drop-shadow(0 0 10px #ff0055);
        }

        h1 { font-size: 24px; color: #ff0055; text-transform: uppercase; letter-spacing: 2px; }

        /* تنسيق الفيديو */
        .video-container { padding: 0 15px; margin-bottom: 40px; }
        video { 
            width: 100%; 
            max-width: 750px; 
            border: 3px solid #ff0055; 
            border-radius: 20px; 
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.5); 
        }

        /* تنسيق معرض الصور */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; 
            padding: 20px; 
        }

        .gallery img { 
            width: 100%; 
            height: 230px; 
            object-fit: cover; 
            border-radius: 12px; 
            transition: transform 0.3s ease, border 0.3s ease;
            background-color: #1a1a1a;
        }

        .gallery img:hover { 
            transform: scale(1.05); 
            border: 2px solid #ff0055; 
        }

        /* تحسين للموبايل */
        @media (max-width: 480px) {
            .gallery { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
            .gallery img { height: 180px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.png" alt="LuvNova Logo" class="logo" onerror="this.style.display='none'">
        <h1>LuvNova Pro</h1>
    </div>

    <div class="video-container">
        <video controls autoplay muted loop playsinline>
            <source src="tutorial.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div class="gallery" id="gallery">
        </div>

    <script>
        const gallery = document.getElementById('gallery');
        // أنواع الصور التي ترفعها
        const categories = ['granny', 'moms', 'young'];
        // سيبحث عن أول 120 صورة من كل نوع لضمان ظهور الكل
        const imagesPerCategory = 120; 

        categories.forEach(cat => {
            for (let i = 1; i <= imagesPerCategory; i++) {
                const img = document.createElement('img');
                // يقرأ الصورة من المجلد الرئيسي مباشرة
                img.src = `${cat}_${i}.jpg`;
                img.alt = `${cat} image ${i}`;
                img.loading = "lazy"; // لتحسين سرعة تحميل الموقع

                // إذا لم يجد الصورة (مثلاً رفعت 80 فقط وليس 120) سيقوم بإخفائها
                img.onerror = function() {
                    this.style.display = 'none';
                };

                gallery.appendChild(img);
            }
        });
    </script>

</body>
</html>
