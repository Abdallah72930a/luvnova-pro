<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="favicon.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #fe3c72; --bg: #fdf2f5; --white: #ffffff; --onlyfans: #00aff0; }
        
        /* ============================================ */
        /* CUSTOM SCROLLBAR (Professional Touch #4) */
        /* ============================================ */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 5px; transition: background 0.3s; }
        ::-webkit-scrollbar-thumb:hover { background: #ff1a4d; }
        
        * { scrollbar-color: var(--primary) var(--bg); scrollbar-width: thin; }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            color: #1c1e21; 
            position: relative; 
            overflow-x: hidden; 
            -webkit-user-select: none; 
            -moz-user-select: none; 
            -ms-user-select: none; 
            user-select: none; 
        }
        
        /* ============================================ */
        /* INTERACTIVE BACKGROUND (Professional Touch #2) */
        /* ============================================ */
        body::before { 
            content: ""; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: url('header-pattern_1.png') repeat; 
            opacity: 0.04; 
            z-index: -1; 
            pointer-events: none; 
        }

        /* Floating Particles Background */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(254, 60, 114, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 175, 240, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(254, 60, 114, 0.05) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
            animation: gradientShift 15s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { 
                background: 
                    radial-gradient(circle at 20% 50%, rgba(254, 60, 114, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(0, 175, 240, 0.08) 0%, transparent 50%),
                    radial-gradient(circle at 40% 20%, rgba(254, 60, 114, 0.05) 0%, transparent 50%);
            }
            50% { 
                background: 
                    radial-gradient(circle at 80% 30%, rgba(254, 60, 114, 0.12) 0%, transparent 50%),
                    radial-gradient(circle at 20% 70%, rgba(0, 175, 240, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 60% 60%, rgba(254, 60, 114, 0.08) 0%, transparent 50%);
            }
        }

        .top-bar { background: #222; color: #fff; padding: 8px; text-align: center; font-size: 11px; font-weight: bold; position: relative; z-index: 1001; }
        
        header { 
            background: #fff; 
            position: sticky; 
            top: 0; 
            z-index: 2000; 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 15px; 
            border-bottom: 1px solid #ffd1dc;
            /* Glassmorphism for header */
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.85);
        }
        
        .header-bg-pattern { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('header-pattern_3.png') repeat; background-size: 80px; opacity: 0.12; z-index: 1; pointer-events: none; }
        .header-left { display: flex; align-items: center; gap: 8px; position: relative; z-index: 5; }
        .site-logo-head { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--primary); background: #fff; }
        header h1 { margin: 0; color: var(--primary); font-size: 19px; font-weight: 800; }
        .menu-container { position: relative; z-index: 9999; }
        .menu-btn { color: #555; font-size: 22px; cursor: pointer; padding: 5px; position: relative; }
        
        .dropdown-menu { 
            display: none; 
            position: absolute; 
            right: 0; 
            top: 45px; 
            background: #fff; 
            border: 1px solid #eee; 
            border-radius: 12px; 
            width: 160px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
            z-index: 10000;
            /* Glassmorphism */
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.9);
        }
        
        .dropdown-menu a { 
            display: block; 
            padding: 12px 15px; 
            color: #333; 
            text-decoration: none; 
            font-size: 14px; 
            border-bottom: 1px solid #f8f8f8; 
            transition: 0.2s;
        }

        .dropdown-menu a:hover {
            background: rgba(254, 60, 114, 0.05);
            color: var(--primary);
        }
        
        .search-container { 
            padding: 12px 15px; 
            background: rgba(255,255,255,0.6); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid #eee; 
        }
        
        #smartSearch { 
            width: 100%; 
            padding: 11px 35px; 
            border-radius: 25px; 
            border: 1px solid #ddd; 
            outline: none; 
            font-size: 13px; 
            box-sizing: border-box; 
            background: #fff;
            transition: 0.3s;
        }

        #smartSearch:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(254, 60, 114, 0.2);
        }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        
        /* ============================================ */
        /* SKELETON LOADING (Professional Touch #3) */
        /* ============================================ */
        .skeleton {
            animation: skeleton-loading 1s linear infinite alternate;
        }

        @keyframes skeleton-loading {
            0% { background-color: #e0e0e0; }
            100% { background-color: #f0f0f0; }
        }

        .card-skeleton {
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: 0 3px 6px rgba(0,0,0,0.03);
        }

        .card-skeleton .skeleton-thumb {
            width: 100%;
            height: 180px;
            background: #e0e0e0;
            animation: skeleton-loading 1s linear infinite alternate;
        }

        .card-skeleton .skeleton-info {
            padding: 10px;
            flex-grow: 1;
        }

        .card-skeleton .skeleton-line {
            height: 12px;
            background: #e0e0e0;
            margin: 8px 0;
            border-radius: 4px;
            animation: skeleton-loading 1s linear infinite alternate;
        }

        .card-skeleton .skeleton-line:nth-child(1) {
            width: 70%;
        }

        .card-skeleton .skeleton-line:nth-child(2) {
            width: 50%;
        }

        .card-skeleton .skeleton-line:nth-child(3) {
            width: 100%;
            height: 30px;
            margin-top: auto;
        }

        /* ============================================ */
        /* PREMIUM UI EFFECTS (Professional Touch #1) */
        /* ============================================ */
        .card { 
            background: var(--white); 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid #eee; 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            box-shadow: 0 3px 6px rgba(0,0,0,0.03);
            /* Glassmorphism */
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            position: relative;
        }

        /* Scale up animation on hover/click */
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(254, 60, 114, 0.15);
        }

        .card.scale-click {
            animation: cardClickScale 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes cardClickScale {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1.05); }
        }

        .card img.main-thumb { width: 100%; height: 180px; object-fit: cover; }
        .info { padding: 10px; display: flex; flex-direction: column; flex-grow: 1; }
        .name-age { font-size: 13px; font-weight: 700; }
        .loc-text { font-size: 10px; color: #28a745; margin-top: 3px; font-weight: bold; }
        .girl-msg { font-size: 10px; color: var(--primary); font-style: italic; height: 32px; margin: 6px 0; overflow: hidden; line-height: 1.3; }
        
        .social-item { 
            background: #fff0f3; 
            padding: 2px 5px; 
            border-radius: 4px; 
            font-size: 8px; 
            font-weight: 700; 
            color: #d63384; 
            border: 1px dashed #ffb3c1; 
            margin-right: 3px; 
            display: inline-block; 
            margin-bottom: 5px;
            transition: 0.2s;
        }

        .social-item:hover {
            background: #ffe0ec;
            transform: translateY(-2px);
        }
        
        /* ============================================ */
        /* HAPTIC FEEDBACK SIMULATION (Professional Touch #5) */
        /* ============================================ */
        .btn-connect { 
            background: var(--primary); 
            color: white; 
            width: 100%; 
            padding: 10px; 
            border-radius: 12px; 
            font-weight: bold; 
            border: none; 
            cursor: pointer; 
            font-size: 11px; 
            margin-top: auto;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-connect:active {
            transform: scale(0.98);
        }

        .btn-connect:hover {
            background: #ff1a4d;
            box-shadow: 0 5px 15px rgba(254, 60, 114, 0.3);
        }

        /* Pulse effect for haptic feedback */
        .btn-connect.pulse {
            animation: buttonPulse 0.6s ease-out;
        }

        @keyframes buttonPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(254, 60, 114, 0.7);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(254, 60, 114, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(254, 60, 114, 0);
                transform: scale(1);
            }
        }

        #live-notif { 
            position: fixed; 
            bottom: -100px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: white; 
            padding: 10px 18px; 
            border-radius: 30px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.15); 
            z-index: 9999; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            border: 1.5px solid var(--primary); 
            transition: 0.6s; 
            width: 85%; 
            max-width: 320px;
            /* Glassmorphism */
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }

        .notif-dot { width: 8px; height: 8px; background: #28a745; border-radius: 50%; animation: pulse-dot 1.5s infinite; }
        @keyframes pulse-dot { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        #locker { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #fff; 
            z-index: 5000; 
            overflow-y: auto;

            backdrop-filter: blur(5px);
            background: rgba(255, 255, 255, 0.95);
        }

        .locker-inner { max-width: 450px; margin: 0 auto; text-align: center; position: relative; z-index: 5; padding-bottom: 40px; }
        .cover-area { width: 100%; height: 140px; background-size: cover; background-position: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; position: relative; }
        .p-header { padding: 0 15px 15px 15px; margin-top: -50px; position: relative; z-index: 10; }
        
        .p-img-main { 
            width: 90px; 
            height: 90px; 
            border-radius: 50%; 
            border: 4px solid #fff; 
            object-fit: cover; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            animation: imgPulse 2s ease-in-out infinite;

        @keyframes imgPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 10px; }
        
        .stat-box { 
            background: #fff; 
            border: 1px solid #ffd1dc; 
            border-radius: 12px; 
            padding: 6px; 
            text-align: center;
            /* Glassmorphism */
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.9);
            transition: 0.3s;
            cursor: pointer;
        }

        .stat-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(254, 60, 114, 0.1);
        }

        .stat-val { display: block; font-weight: 800; font-size: 11px; color: #333; }
        
        .stat-of { 
            background: #eaf8ff; 
            border-color: #00aff0; 
            color: #00aff0;
            /* Glassmorphism */
            backdrop-filter: blur(10px);
            background: rgba(234, 248, 255, 0.9);
        }
        
        .social-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 8px; 
            margin: 15px; 
            padding: 12px; 
            background: rgba(253,249,250,0.9); 
            border-radius: 20px; 
            border: 1px solid #fff;
            /* Glasmorphism */
            backdrop-filter: blur(10px);
        }

        .soc-icon { 
            position: relative; 
            font-size: 20px; 
            padding: 10px; 
            background: #fff; 
            border-radius: 12px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border: 1px solid #eee; 
            cursor: pointer; 
            transition: 0.3s;
            /* Glasmorphism */
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.9);
        }

        .soc-icon:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 5px 15px rgba(254, 60, 114, 0.15);
        }

        .soc-lock { position: absolute; bottom: 3px; right: 3px; font-size: 8px; color: #ff0000; background: #fff; border-radius: 50%; padding: 1px; }
        
        .captcha-area { 
            background: #fff; 
            border: 2px solid #ffd1dc; 
            border-radius: 20px; 
            padding: 20px; 
            margin: 20px; 
            transition: 0.3s; 
            z-index: 10; 
            position: relative;
            /* Glasmorphism */
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.9);
        }

        .recaptcha-box { 
            background: #f9f9f9; 
            border: 1px solid #d3d3d3; 
            height: 75px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 15px; 
            cursor: pointer; 
            border-radius: 6px;
            transition: 0.3s;
            /* Glasmorphism */
            backdrop-filter: blur(10px);
            background: rgba(249, 249, 249, 0.9);
        }

        .recaptcha-box:hover {
            border-color: var(--primary);
            box-shadow: 0 3px 10px rgba(254, 60, 114, 0.1);
        }

        .checkbox { width: 24px; height: 24px; border: 2px solid #c1c1c1; background: #fff; border-radius: 3px; }
        .checkbox.loading { border-radius: 50%; border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes shake-anim { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(8px); } 75% { transform: translateX(-8px); } }
        .shake-now { animation: shake-anim 0.4s ease-in-out; border-color: var(--primary) !important; box-shadow: 0 0 20px rgba(254,60,114,0.2) !important; }
        
        #offers-wrap { display: none; margin-top: 20px; text-align: left; }
        
        .offer-card { 
            background: #fff; 
            border: 1px solid #eee; 
            border-radius: 15px;

        }

        .offer-card:hover {
            transform: translateX(5px);

        .offer-step-tag { position: absolute; top: 0; right: 0; background: var(--primary); color: #fff; font-size: 8px; padding: 3px 10px; border-bottom-left-radius: 12px; font-weight: bold; }
        .offer-card img { width: 48px; height: 48px; border-radius: 10px; margin-right: 12px; object-fit: cover; background: #f9f9f9; border: 1px solid #eee; }
        
        .vid-container { 
            width: 92%; 
            max-width: 280px; 
            height: 400px; 
            margin: 20px auto;

            overflow: hidden;

            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .vid-container video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>

        {city: "London", country: "United Kingdom"}, {city: "Paris", country: "France"}, 
        {city: "Berlin", country: "Germany"}, {city: "Sydney", country: "Australia"},
        {city: "Toronto", country: "Canada"}, {city: "Madrid", country: "Spain"}
    ];

    const realBios = [
        "Looking for someone tonight. ❤️", "Serious connection only.", 
        "Active now, let's chat. 🔥", "Unlock my private gallery.", 
        "Join me on my private channel.", "New photos uploaded today!", 
        "I am closer than you think.", "Exclusive content inside 🔒"
    ];

    // ============================================
    // IMAGE PROXY FUNCTION (UPDATED TO weserv.nl)
    // ============================================
    function getProxiedImageUrl(originalUrl) {
        if (!originalUrl) return 'https://cdn-icons-png.flaticon.com/512/1162/1162933.png';
        if (originalUrl.startsWith('//')) originalUrl = 'https:' + originalUrl;
        return `https://images.weserv.nl/?url=${encodeURIComponent(originalUrl)}`;
    }

    function triggerHapticFeedback() { if (navigator.vibrate) { navigator.vibrate(10); } }

    function fetchLocation() {
        $.ajax({
            url: "https://ipapi.co/jsonp/",
            dataType: "jsonp",
            success: function(data) {
                if(data && data.city) {
                    userCity = data.city; countryName = data.country_name;
                    currentLocationData = {city: userCity, country: countryName};
                    $(".loc-var").text(userCity + ", " + countryName);
                    updateAllLocations();
                    setTimeout(showLiveNotif, 4000);
                }
            },
            error: function() { renderGrid(); }
        });
    }

    function updateAllLocations() {
        $(".card").each(function(idx) {
            let locEl = $(this).find(".loc-text");
            let btnEl = $(this).find(".btn-connect");
            if(locEl.text().includes("Your Area")) {
                let finalLoc;
                if(idx % 3 === 0) {
                    finalLoc = userCity + ", " + countryName;
                    $(this).data("cardLocation", {city: userCity, country: countryName, display: finalLoc});
                } else {
                    let intlData = intlPool[idx % intlPool.length];
                    finalLoc = intlData.city + ", " + intlData.country;
                    $(this).data("cardLocation", {city: intlData.city, country: intlData.country, display: finalLoc});
                }
                locEl.html('<i class="fas fa-map-marker-alt"></i> ' + finalLoc);
                btnEl.attr('data-location', finalLoc);
            }
        });
    }

    function createSkeletonCard() {
        return `<div class="card-skeleton"><div class="skeleton-thumb"></div><div class="skeleton-info"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line" style="height: 30px; margin-top: auto;"></div></div></div>`;
    }

    function showSkeletonLoading() {
        let skeletons = '';
        for(let i = 0; i < 6; i++) { skeletons += createSkeletonCard(); }
        document.getElementById('main-grid').innerHTML = skeletons;
    }

    function shuffleArray(array) {
        const shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
        return shuffled;
    }

    function toggleMenu() { $('#mainMenu').fadeToggle(200); }

    const names = ["Maddie", "Sienna", "Chloe", "Amber", "Tiffany", "Elena", "Sophie", "Isabella", "Ava", "Mia", "Zoe", "Layla"];

    function showLiveNotif() {
        $("#notif-name").text(names[Math.floor(Math.random()*names.length)]);
        $(".loc-var").text(userCity + ", " + countryName);
        $("#live-notif").css("bottom", "20px");
        setTimeout(() => { $("#live-notif").css("bottom", "-100px"); setTimeout(showLiveNotif, 12000); }, 5000);
    }

    function createCard(type, i) {
        let name = names[i % names.length] + " " + String.fromCharCode(65 + (i % 26)) + ".";
        let age = (type === 'young') ? Math.floor(Math.random()*11)+24 : (type === 'moms') ? Math.floor(Math.random()*11)+35 : Math.floor(Math.random()*11)+46;
        let locationDisplay = "Your Area";
        return `<div class="card" data-info="${name.toLowerCase()}" data-type="${type}" data-index="${i}" onclick="handleCardClick(this)">
            <img src="${type}_${i}.jpg" class="main-thumb" loading="lazy" onerror="this.parentElement.style.display='none'">
            <div class="info">
                <div class="name-age">${name}, ${age}</div>
                <div class="loc-text"><i class="fas fa-map-marker-alt"></i> ${locationDisplay}</div>
                <span class="girl-msg">"${realBios[i % realBios.length]}"</span>
                <div style="margin-top:5px;"><span class="social-item">🔒 WhatsApp</span><span class="social-item">🔒 Snapchat</span></div>
                <button class="btn-connect" onclick="handleConnectClick(event, this)" data-name="${name}" data-img="${type}_${i}.jpg" data-location="${locationDisplay}">Connect Now</button>
            </div>
        </div>`;
    }

    function handleCardClick(cardElement) { cardElement.classList.add('scale-click'); setTimeout(() => cardElement.classList.remove('scale-click'), 400); }

    function renderGrid() {
        showSkeletonLoading();
        setTimeout(() => {
            let cards = [];
            for (let i = 1; i <= 60; i++) { cards.push(createCard('young', i)); cards.push(createCard('moms', i)); cards.push(createCard('granny', i)); }
            cards = shuffleArray(cards);
            document.getElementById('main-grid').innerHTML = cards.join('');
            fetchLocation();
        }, 1000);
    }

    renderGrid();

    function openLocker(name, img, location) {
        currentProfileLocation = location;
        document.getElementById('p-name').innerText = name;
        document.getElementById('p-img').src = img;
        document.getElementById('st-ph').innerText = (Math.floor(Math.random() * 50) + 20) + " Photos";
        document.getElementById('st-vi').innerText = (Math.floor(Math.random() * 5) + 2) + " Videos";
        document.getElementById('p-cover').style.backgroundImage = `url('cover_${Math.floor(Math.random()*23)+1}.jpg')`;
        document.getElementById('locker').style.display = 'block';
        spawnLockerDecor();
        const vid = document.getElementById('tutorialVideo');
        vid.muted = false; vid.play().catch(() => { vid.muted = true; vid.play(); });
        setTimeout(() => { document.getElementById('sync-text').innerHTML = `<span style="color:#28a745;font-weight:bold;"><i class="fas fa-circle" style="font-size:7px;animation:pulse 1.5s infinite"></i> Active Now in ${currentProfileLocation}</span>`; }, 1000);
    }

    function handleConnectClick(event, buttonElement) {
        event.stopPropagation(); triggerHapticFeedback();
        buttonElement.classList.add('pulse'); setTimeout(() => buttonElement.classList.remove('pulse'), 600);
        openLocker(buttonElement.getAttribute('data-name'), buttonElement.getAttribute('data-img'), buttonElement.getAttribute('data-location'));
    }

    function triggerCaptcha() {
        const box = document.getElementById('captcha-box');
        if(box.classList.contains('loading')) return;
        box.classList.add('loading'); triggerHapticFeedback();
        setTimeout(() => { document.getElementById('offers-wrap').style.display = 'block'; fetchOffers(); }, 1200);
    }

    function fetchOffers() {
        const feedUrl = "https://d5b3uz3fo8hn3.cloudfront.net/public/offers/feed.php?user_id=570304&api_key=0da06ad8edf91a87f3387591d987d7bb&callback=?";
        $.getJSON(feedUrl, function(offers) {
            let html = '';
            const englishOffers = offers.filter(o => !/[\u0600-\u06FF]/.test(o.title)).slice(0, 4);
            englishOffers.forEach((offer, index) => {
                let icon = getProxiedImageUrl(offer.icon);
                html += `<a href="${offer.url}" target="_blank" class="offer-card">
                    <div class="offer-step-tag">STEP ${index+1}</div>
                    <img src="${icon}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1162/1162933.png'">
                    <div><div style="font-size:13px; font-weight:800; color:#222;">${offer.anchor || offer.title}</div><div style="font-size:10px; color:var(--primary); font-weight:bold; margin-top:3px;">[COMPLETE TO UNLOCK]</div></div>
                </a>`;
            });
            $("#offers-list").html(html || "<p style='text-align:center; font-size:11px;'>Checking secure tasks...</p>");
        });
    }

    function remindCaptcha() { const area = $('#captcha-area'); area.addClass('shake-now'); setTimeout(() => area.removeClass('shake-now'), 400); triggerHapticFeedback(); }
    function filterProfiles() { let input = $('#smartSearch').val().toLowerCase(); $('.card').each(function() { $(this).toggle($(this).text().toLowerCase().includes(input)); }); }
    function closeLocker() { $('#locker').hide(); document.getElementById('tutorialVideo').pause(); currentProfileLocation = null; }

    function spawnLockerDecor() {
        const decor = document.getElementById('lockerDecor'); decor.innerHTML = '';
        for(let i = 0; i < 15; i++) {
            const el = document.createElement('div');
            el.style.cssText = `position: absolute; width: ${Math.random()*60+20}px; height: ${Math.random()*60+20}px; background: rgba(254, 60, 114, ${Math.random()*0.1+0.02}); border-radius: 50%; left: ${Math.random()*100}%; top: ${Math.random()*100}%; animation: float ${Math.random()*20+15}s infinite ease-in-out;`;
            decor.appendChild(el);
        }
    }

    const style = document.createElement('style'); style.textContent = `@keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }`; document.head.appendChild(style);
</script>
</body>
</html>
