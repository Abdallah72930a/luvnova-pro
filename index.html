<body>

<div class="top-bar">Trial ends in <span id="timer">05:00</span></div>

<header>

        <img src="logo.jpg" class="site-logo" onerror="this.src='logo.png'">
        <h1>LuvNova<span>PRO</span></h1>
    </div>
    <div class="menu-btn"><i class="fas fa-bars"></i></div>
</header>

<div class="search-container">
    <input type="text" id="smartSearch" placeholder="Search profiles..." onkeyup="filterProfiles()">
</div>

<div id="main-grid" class="grid"></div>

<div id="locker">
    <div class="locker-box">
        <h2 style="color:var(--primary); font-size:19px; margin: 0;">Verification Required 🔒</h2>
        <p style="font-size:11px; color: #777; margin-top: 5px;">Unlock <b><span id="target-name"></span></b>'s private data.</p>
        <div id="social-preview-list"></div>
        <button onclick="_Hj()" class="open-btn">OPEN ACCESS NOW</button>
        <div style="border-top:1px solid #eee; padding-top:10px; margin-top: 5px;">
            <p style="font-size:11px; font-weight:bold; color: #444; margin-bottom: 8px;">📺 Tutorial: How to unlock</p>

                <video id="tutorialVideo" controls loop poster="logo.jpg" playsinline muted>
                    <source src="tutorial.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <p style="font-size: 9px; color: #999; margin-top: 10px; font-style: italic;">"Follow the steps to connect!" 🌸</p>
        </div>

</div>

<script>
    const firstNames = ["Maddie", "Sienna", "Chloe", "Amber", "Tiffany", "Elena", "Sophie", "Isabella", "Lexi", "Brook", "Jade", "Nikki", "Emma", "Mila", "Aria", "Scarlett", "Layla", "Ava", "Mia", "Zoe"];
    const cityOptions = ["London", "New York", "Toronto", "Miami", "Los Angeles"];
    const bioTemplates = [
        "Looking for a real man to build a life with. 💍", 
        "Single mom here. Tired of being lonely. ❤️", 
        "Wealthy but alone.. Heart is empty. ✨", 
        "Ready to move for the right man. ✈️",
        "Just a lonely woman looking for marriage. ❤️",
        "Searching for a gentleman to share my success. 💎",
        "Independent, but my heart is empty. 🤫",
        "Wanting to start over. Is there anyone serious? 🏠",
        "Single, successful, and waiting for you. 🌹",
        "Let's make a beautiful family together. 👨‍👩‍👧"
    ];

    function getRandomSocials() { return ["WhatsApp", "Instagram", "Snapchat", "TikTok"].sort(() => 0.5 - Math.random()).slice(0, 3); }

    function getNonRepeating(list) {
        let shuffle = [...list].sort(() => 0.5 - Math.random());
        let index = 0;
        return function() {
            if (index >= shuffle.length) { shuffle = [...list].sort(() => 0.5 - Math.random()); index = 0; }
            return shuffle[index++];
        };
    }

    const getName = getNonRepeating(firstNames);
    const getBio = getNonRepeating(bioTemplates);

    function createCard(num, type, minAge, maxAge) {
        let name = getName() + " " + String.fromCharCode(65 + Math.floor(Math.random() * 26)) + ".";
        let age = Math.floor(Math.random() * (maxAge - minAge + 1)) + minAge;
        let city = cityOptions[Math.floor(Math.random() * cityOptions.length)];
        let bio = getBio(); 
        
        let socials = getRandomSocials();
        let fileName = `${type.toLowerCase()}_${num}.jpg`;
        let socialHtml = socials.map(s => `<div class="social-item">🔒 ${s}</div>`).join('');

        return `<div class="card" data-search="${name.toLowerCase()} ${city.toLowerCase()}">
                <img src="${fileName}" loading="lazy" onerror="this.parentElement.style.display='none'">
                <div class="info">
                    <div class="name-age">${name}, ${age}</div>
                    <div class="loc">${city}</div>
                    <span class="girl-msg">"${bio}"</span>
                    <div class="social-links">${socialHtml}</div>
                    <button class="btn-connect" onclick="openLocker('${name}', '${socials.join(', ')}')">Connect Now</button>
                </div>
            </div>`;
    }

    const grid = document.getElementById('main-grid');
    let allContent = [];
    for (let i = 1; i <= 200; i++) {
        allContent.push(createCard(i, 'young', 24, 33));
        allContent.push(createCard(i, 'moms', 35, 45));
        if(i <= 100) allContent.push(createCard(i, 'granny', 50, 65));
    }
    
    allContent.sort(() => Math.random() - 0.5);
    grid.innerHTML = allContent.join('');

    function filterProfiles() {
        let input = document.getElementById('smartSearch').value.toLowerCase();
        let cards = document.getElementsByClassName('card');
        for (let i = 0; i < cards.length; i++) {
            let searchContent = cards[i].getAttribute('data-search');
            cards[i].style.display = searchContent.includes(input) ? "" : "none";
        }
    }

    let time = 300;
    setInterval(() => {
        let min = Math.floor(time / 60); let sec = time % 60;
        document.getElementById('timer').innerText = `0${min}:${sec < 10 ? '0'+sec : sec}`;
        if(time > 0) time--;
    }, 1000);

    function openLocker(name, socials) {
        document.getElementById('target-name').innerText = name;
        let list = socials.split(', ');
        let previewHtml = list.map(s => `<div>✅ ${s}: LOCKED</div>`).join('');
        document.getElementById('social-preview-list').innerHTML = previewHtml;
        document.getElementById('locker').style.display = 'flex';
        
        // تشغيل الفيديو آلياً عند فتح اللوكر (يجب أن يكون صامتاً ليعمل التشغيل التلقائي في بعض المتصفحات)
        const video = document.getElementById('tutorialVideo');
        video.muted = false; // إذا حظره المتصفح، سيطلب الزائر تشغيله يدوياً بس سيكون ممتلئاً
        video.play();
    }
</script>
